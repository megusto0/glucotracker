<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>glucotacker · мобильная концепция</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="tokens.css" />
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: var(--sans); }
  body { background: #f0eee9; }
  * { box-sizing: border-box; }
  @keyframes caret { 50% { opacity: 0; } }

  /* Make sure DC headers/labels read in serif consistent with the design */
  .dc-card { background: transparent !important; }

  /* Note style */
  .note {
    font-family: var(--sans);
    font-size: 11px;
    line-height: 1.5;
    color: rgba(60,50,40,0.78);
    max-width: 320px;
    padding: 6px 0 0;
  }
  .note b { color: rgba(40,30,20,0.95); font-weight: 600; }
  .note code { font-family: var(--mono); font-size: 10.5px; background: rgba(0,0,0,0.05); padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const W = PHONE_W, H = PHONE_H;

function App() {
  return (
    <DesignCanvas title="glucotacker · мобильная концепция" subtitle="Десктоп — обзор/настройка/отчёты. Мобила — захват и беглый взгляд.">

      <DCSection id="core" title="I · Главные сценарии" subtitle="«в момент еды», «между делом», «перед сном»">
        <DCArtboard id="today" label="01 · Сегодня" width={W} height={H}>
          <ScreenToday />
        </DCArtboard>
        <DCArtboard id="stats" label="02 · Статистика (свайп ← из Сегодня)" width={W} height={H}>
          <ScreenStats />
        </DCArtboard>
        <DCArtboard id="glucose" label="03 · Глюкоза" width={W} height={H}>
          <ScreenGlucose />
        </DCArtboard>
      </DCSection>

      <DCSection id="capture" title="II · Захват" subtitle="Модальный, не вкладочный. FAB → шит → фото/текст/шаблон → черновик → принять.">
        <DCArtboard id="capture-sheet" label="04 · Bottom sheet (FAB)" width={W} height={H}>
          <ScreenCaptureSheet />
        </DCArtboard>
        <DCArtboard id="draft" label="05 · Черновик после фото" width={W} height={H}>
          <ScreenDraft />
        </DCArtboard>
        <DCArtboard id="text" label="06 · Текстовый ввод (первый класс)" width={W} height={H}>
          <ScreenTextInput />
        </DCArtboard>
      </DCSection>

      <DCSection id="record" title="III · Запись и история" subtitle="Уплощённая правая панель десктопа + лента дней.">
        <DCArtboard id="record" label="07 · Запись (детали приёма)" width={W} height={H}>
          <ScreenRecord />
        </DCArtboard>
        <DCArtboard id="history" label="08 · История" width={W} height={H}>
          <ScreenHistory />
        </DCArtboard>
      </DCSection>

      <DCSection id="more" title="IV · База и настройки" subtitle="Просмотр, не редактирование. Импорт и URL/secret — десктоп.">
        <DCArtboard id="base" label="09 · База продуктов" width={W} height={H}>
          <ScreenBase />
        </DCArtboard>
        <DCArtboard id="settings" label="10 · Ещё (настройки)" width={W} height={H}>
          <ScreenSettings />
        </DCArtboard>
      </DCSection>

      <DCSection id="bonus" title="V · Только мобильное" subtitle="Чего нет на десктопе и не должно быть.">
        <DCArtboard id="offline" label="11 · Офлайн outbox" width={W} height={H}>
          <ScreenOffline />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
