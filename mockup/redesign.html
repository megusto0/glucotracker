<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>glucotracker — UI redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html,body,#root{height:100%;}
    body{background:#f0eee9;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="panels.jsx"></script>
  <script type="text/babel" src="stats.jsx"></script>
  <script type="text/babel" src="glucose.jsx"></script>
  <script type="text/babel" src="other-pages.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="redesign" title="glucotracker — UI redesign" subtitle="Десктоп · 02 мая 2026">
            <DCArtboard id="stats"   label="Статистика — новый калорийный баланс"   width={1280} height={820}>
              <StatsPage />
            </DCArtboard>
            <DCArtboard id="glucose" label="Глюкоза — переработанная иерархия"        width={1280} height={820}>
              <GlucosePage />
            </DCArtboard>
            <DCArtboard id="settings" label="Настройки · Nightscout"                  width={1280} height={820}>
              <SettingsPage />
            </DCArtboard>
          </DCSection>

          <DCSection id="journal" title="Журнал · режимы правой панели" subtitle="Панель появляется при наборе текста или клике на запись — основной контент сужается">
            <DCArtboard id="journal-default" label="Журнал · покой"                   width={1280} height={820}>
              <JournalPage />
            </DCArtboard>
            <DCArtboard id="journal-typing" label="Журнал · набор «Воп» → автозаполнение" width={1280} height={820}>
              <JournalPage panelMode="autocomplete" />
            </DCArtboard>
            <DCArtboard id="journal-selected" label="Журнал · клик по записи"          width={1280} height={820}>
              <JournalPage panelMode="selected-meal" />
            </DCArtboard>
          </DCSection>

          <DCSection id="other" title="История и База — те же правила" subtitle="Клик по записи или продукту — панель сужает основной контент">
            <DCArtboard id="history-default" label="История · покой"                   width={1280} height={820}>
              <HistoryPage />
            </DCArtboard>
            <DCArtboard id="history-selected" label="История · клик по записи"         width={1280} height={820}>
              <HistoryPage panelMode="selected-meal" />
            </DCArtboard>
            <DCArtboard id="database-default" label="База · покой"                     width={1280} height={820}>
              <DatabasePage />
            </DCArtboard>
            <DCArtboard id="database-selected" label="База · клик по продукту"         width={1280} height={820}>
              <DatabasePage panelMode="selected-db" />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
