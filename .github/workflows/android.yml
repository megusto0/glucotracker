name: Android

on:
  pull_request:
    paths:
      - "android-concept/**"
      - "docs/openapi.yaml"
      - ".github/workflows/android.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "android-concept/**"
      - "docs/openapi.yaml"
      - ".github/workflows/android.yml"

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-concept
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleGlucoDebug assembleFoodDebug
      - run: ./gradlew lint testGlucoDebug testFoodDebug
