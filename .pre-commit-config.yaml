repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: python
        types_or: [python, pyi]
        additional_dependencies: ["ruff==0.15.12"]

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: python
        types_or: [python, pyi]
        additional_dependencies: ["ruff==0.15.12"]

      - id: prettier
        name: prettier
        entry: prettier --write
        language: node
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]
        additional_dependencies: ["prettier@3.4.2"]
